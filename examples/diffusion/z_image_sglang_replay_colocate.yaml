# @package _global_
# Z-Image (base) + SGLang dedicated rollout, colocate, LoRA sync, REPLAY logprob,
# v2 trainer, FlowGRPO.
#
# Dedicated rollout (contrast with z_image_trainside.yaml): the SGLang
# DiffGenerator runs the FULL diffusion pipeline (Qwen3 text-encode + S3-DiT
# denoise + VAE decode) in its own worker subprocess. The trainer pushes the
# freshly-trained LoRA adapter into it every `weight_sync_interval` rollouts
# (LocalLoraWeightSync, colocate). Trainside instead samples the live FSDP
# pipeline in-process with no weight sync.
#
# REPLAY mode (`algorithm.old_logp_source: replay`): the trainer recomputes the
# pi_old anchor via `ZImageDiffusionStage.replay` at update time; SGLang's
# native per-step log-probs (if any) are ignored. Safest for a freshly-wired
# model — it does not require the engine's log-probs to be numerically matched,
# only that rollout and replay use identical sigma schedules (asserted by
# `verify_engine_used_sigmas`) and identical conditions (carried on the resp).
#
# CFG OFF (guidance_scale=0): SGLang gates CFG on guidance_scale>1, so 0 keeps
# it off (single forward, no negative prompt), matching z_image_trainside.yaml
# and the leader's directive (CFG slows the reward curve). Trainer-side replay
# also runs CFG-free because no negative_text condition is emitted.
#
# Scale via launcher (num_devices = cluster GPU count); this same recipe runs on
# 2 (H20 smoke), 8 (1-node) and 32 (4x8) GPUs. batch_size=64 divides 2/8/32.
# Quick smoke: batch_size=2 sampling.samples_per_prompt=4 num_rollouts=2.

num_devices: 8
batch_size: 64                # prompts_per_rollout (divisible by 2/8/32)
adv_use_global_std: true     # advantage: divide by ONE batch-wide std (v1 parity), not per-group
num_rollouts: 10000

logging:
  # Env-driven so multi-node runs enable W&B with REPORT_TO_WANDB=true (the
  # launcher exports it). rank-0/driver only; no-op when false.
  report_to_wandb: ${oc.decode:${oc.env:REPORT_TO_WANDB,false}}
  project_name: ${oc.env:WANDB_PROJECT,unirl-zimage}
  run_name: ${oc.env:WANDB_RUN_NAME,z_image_base_sglang}
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: null

# Shared nodes: model_config + strategy defined once, referenced by
# bundle / pipeline / rollout. SGLang needs both at init in its subprocess
# (it loads its own copy of the weights off model_config.pretrained_*).
model_config:
  _target_: unirl.models.z_image.config.ZImagePipelineConfig
  pretrained_model_ckpt_path: ${oc.env:Z_IMAGE_PATH,Tongyi-MAI/Z-Image}
  model_precision: bf16
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  max_sequence_length: 512
  # Static FlowMatch shift; base Z-Image's scheduler_config.json declares
  # use_dynamic_shifting=false + shift=6.0. The SGLang engine reads this to
  # build its sigma schedule via FlowMatchSchedulePolicy.from_pretrained
  # (Z-Image exposes no build_schedule_policy() hook, so the generic
  # static-shift branch applies — same as SD3 / Wan).
  shift: 6.0
  # SGLang builds its LoRA ServerArgs from these two fields.
  use_lora: true
  lora_target_modules:
    - to_k
    - to_out.0
    - to_q
    - to_v

# Shared SDE strategy; SGLang resolves its sde_label (flow -> "sde") from it.
strategy:
  _target_: unirl.sde.kernels.FlowSDEStrategy

bundle:
  _target_: unirl.models.z_image.bundle.ZImageBundle.from_config
  config: ${model_config}

# Trainer-side pipeline: used by REPLAY to recompute pi_old (and by eval). The
# rollout itself runs in SGLang, not here.
pipeline:
  _target_: unirl.models.z_image.pipeline.ZImagePipeline
  shift: 6.0
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  max_sequence_length: 512
  strategy: ${strategy}

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["ZImageTransformerBlock"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: true
    # 6B S3-DiT + Qwen3 text encoder under full-graph replay: keep AC on.
    activation_checkpointing: true
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 10000
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 64
    alpha: 128
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    # Z-Image single-stream attention (diffusers Attention inside
    # ZImageTransformerBlock): q/k/v projections + output proj. MUST stay
    # identical to model_config.lora_target_modules and rollout.config.
    # target_modules below — drift silently drops LoRA keys at weight sync.
    target_modules:
      - to_k
      - to_out.0
      - to_q
      - to_v

rollout:
  _target_: unirl.rollout.engine.sglang.engine.SGLangRolloutEngine
  config:
    _target_: unirl.rollout.engine.sglang.config.SGLangEngineConfig
    model_family: z_image
    populate_conditions: true   # pack SGLang prompt_embeds into resp.conditions['text'] for replay
    init_same_noise: ${sampling.init_same_noise}
    # Chunk generate into sub-batches so SGLang bounds its DiT-forward / VAE-decode
    # peak memory (6B DiT + Qwen3 encoder are heavy); mirrors z_image_trainside.
    forward_batch_size: 8
    num_gpus: 1
    tp_size: 1
    local_mode: true
    target_modules:
      - to_k
      - to_out.0
      - to_q
      - to_v
    # model detection is path-based (registry model_detectors match
    # "Tongyi-MAI/Z-Image"); model_type is not a ServerArgs field so it is a
    # harmless structural mirror of the sd3 recipe.
    engine_kwargs:
      model_type: z_image
  # SGLang reads ckpt/LoRA off model_config and sde_label off strategy.
  model_config: ${model_config}
  strategy: ${strategy}

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.pickscore.PickScoreRewardScorer
    base_device: cuda
    config:
      _target_: unirl.reward.local.pickscore.PickScoreSpec
      batch_size: 8
      device: auto
      processor_id: laion/CLIP-ViT-H-14-laion2B-s32B-b79K
      model_id: yuvalkirstain/PickScore_v1

algorithm:
  _target_: unirl.algorithms.flowgrpo.FlowGRPO
  stage_attr: diffusion
  clip_range: 1.0e-4
  clip_schedule: constant
  # REPLAY mode: trainer recomputes the pi_old anchor via stage.replay at update
  # time (engine emits trajectories; its native log-probs, if any, are ignored).
  old_logp_source: replay
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.z_image.conditions.ZImageConditions
  params: ${sampling}

stack:
  _target_: unirl.train.stack.TrainStack
  # Train-side micro-batch (grad-accum granularity only; does not change the
  # optimization math). See z_image_trainside.yaml — resident frozen weights
  # dominate HBM, so this can go high. On the 4x8 run the per-GPU mini-batch is
  # 16; bump to 16 via stack.micro_batch_size=16 if HBM allows.
  micro_batch_size: 8
  max_grad_norm: 1.0
  num_updates_per_batch: 2      # PPO mini-batches per rollout (π_old frozen once); v1 parity

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: datasets/pickscore/train.txt
      eval_data_path: datasets/pickscore/test.txt
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  num_inference_steps: 12       # base Z-Image multi-step (matches trainside)
  guidance_scale: 0.0           # CFG OFF (SGLang gates CFG on >1; 0 disables it)
  height: 512
  width: 512
  eta: 0.7
  samples_per_prompt: 16
  seed: 42
  init_same_noise: false
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  scheduler:
    _target_: unirl.utils.scheduler_utils.AllSDEScheduler
    num_timesteps: ${..num_inference_steps}
    num_sde_steps: 3
    # SDE-step window: confine SDE noise to the early high-σ steps.
    timestep_fraction: [0, 0.5]

# LoRA weight-sync cadence (read by DiffusionTrainer.train). Every N rollouts
# the loop pushes the freshly-trained adapter into SGLang (fused into the
# generate wake/sleep). 1 = on-policy; >1 lags rollout weights (off-policy).
weight_sync_interval: 1

# LoRA weight sync -> SGLang rollout. Same bridge vllm-omni uses.
sync:
  _target_: unirl.distributed.weight_sync.lora.LocalLoraWeightSync
  verify: false  # SGLang engine lacks loaded_lora_checksums; skip read-back
  # Must match model_config.weight_sync_param_name_prefix and the engine-side
  # LoRA key naming (a wrong prefix yields wrong/zero loaded layers).
  param_prefix: "transformer."
  adapter_name: default
